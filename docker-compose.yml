services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    environment:
      DATABASE_URL: mysql://doctofree:doctofree@mysql:3306/doctofree?serverVersion=8.0&charset=utf8mb4

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: doctofree
      MYSQL_USER: doctofree
      MYSQL_PASSWORD: doctofree
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
